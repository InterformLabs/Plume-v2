<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Menu — Plume</title>

<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-PCW1PJMRVW"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-PCW1PJMRVW');
</script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Outfit:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #1e2e1f;
    --bg-deep:   #151f15;
    --gold:      #c9a96e;
    --gold-dim:  rgba(201,169,110,0.12);
    --gold-line: rgba(201,169,110,0.25);
    --white:     #f0ece4;
    --white-dim: rgba(240,236,228,0.5);
    --white-faint:rgba(240,236,228,0.18);
  }

  html, body { min-height: 100%; background: var(--bg-deep); color: var(--white); font-family: 'Outfit', sans-serif; font-weight: 300; }

  body::before {
    content: ''; position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none; z-index: 999; opacity: 0.6;
  }

  body::after {
    content: ''; position: fixed; top: -100px; left: 50%; transform: translateX(-50%);
    width: 500px; height: 400px;
    background: radial-gradient(ellipse, rgba(201,169,110,0.06) 0%, transparent 70%);
    pointer-events: none; z-index: 0;
  }

  .page { position: relative; z-index: 1; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 56px 28px 48px; }

  .deco-line-top { width: 1px; height: 40px; background: linear-gradient(to bottom, transparent, var(--gold-line)); margin-bottom: 36px; opacity: 0; animation: fadeIn 0.8s ease forwards 0.2s; }

  .logo-wrap { margin-bottom: 10px; opacity: 0; animation: fadeUp 0.7s ease forwards 0.35s; }

  .logo-wrap a { display: block; text-decoration: none; transition: opacity 0.25s ease; }
  .logo-wrap a:hover { opacity: 0.75; }

  .logo-wrap img { width: auto; height: 300px; object-fit: contain; }

  .tagline { font-family: 'Cormorant Garamond', serif; font-size: 13px; font-weight: 300; font-style: italic; letter-spacing: 0.2em; color: var(--gold); opacity: 0; animation: fadeUp 0.7s ease forwards 0.5s; margin-bottom: 48px; }

  .gold-rule { width: 40px; height: 1px; background: var(--gold-line); margin: 0 auto 48px; opacity: 0; animation: fadeIn 0.7s ease forwards 0.55s; }

  .menu-label { font-size: 10px; letter-spacing: 0.35em; text-transform: uppercase; color: var(--white-dim); margin-bottom: 20px; opacity: 0; animation: fadeUp 0.7s ease forwards 0.6s; }

  .btn-col { display: flex; flex-direction: column; gap: 12px; width: 100%; max-width: 300px; opacity: 0; animation: fadeUp 0.7s ease forwards 0.75s; }

  .btn { position: relative; display: flex; align-items: center; justify-content: space-between; padding: 18px 24px; border: 1px solid var(--gold-line); background: var(--gold-dim); text-decoration: none; color: var(--white); cursor: pointer; transition: transform 0.25s ease, background 0.25s ease, border-color 0.25s ease, box-shadow 0.25s ease; overflow: hidden; -webkit-tap-highlight-color: transparent; }

  .btn::before { content: ''; position: absolute; inset: 0; background: linear-gradient(135deg, rgba(201,169,110,0.1), transparent); opacity: 0; transition: opacity 0.3s ease; }

  .btn:hover { transform: translateY(-2px); background: rgba(201,169,110,0.18); border-color: rgba(201,169,110,0.45); box-shadow: 0 8px 28px rgba(0,0,0,0.3); }
  .btn:hover::before { opacity: 1; }
  .btn:active { transform: scale(0.97); }

  .btn-text { position: relative; z-index: 1; display: flex; flex-direction: column; gap: 2px; }
  .btn-title { font-family: 'Cormorant Garamond', serif; font-size: 20px; font-weight: 400; letter-spacing: 0.06em; color: var(--white); }
  .btn-hint { font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--gold); opacity: 0.7; }
  .btn-arrow { position: relative; z-index: 1; font-size: 16px; color: var(--gold); opacity: 0.6; transition: transform 0.25s ease, opacity 0.25s ease; }
  .btn:hover .btn-arrow { transform: translateX(3px); opacity: 1; }

  .ripple { position: absolute; border-radius: 50%; width: 8px; height: 8px; background: rgba(201,169,110,0.2); transform: scale(0); animation: ripple-anim 0.5s ease-out forwards; pointer-events: none; }
  @keyframes ripple-anim { to { transform: scale(30); opacity: 0; } }

  .deco-line-bottom { width: 1px; height: 36px; background: linear-gradient(to bottom, var(--gold-line), transparent); margin-top: 44px; opacity: 0; animation: fadeIn 0.8s ease forwards 1s; }

  .powered-by { margin-top: 16px; opacity: 0; animation: fadeIn 0.8s ease forwards 1.1s; }
  .powered-by a { font-size: 9px; letter-spacing: 0.25em; text-transform: uppercase; color: rgba(201,169,110,0.25); text-decoration: none; transition: color 0.3s ease; }
  .powered-by a:hover { color: rgba(201,169,110,0.5); }

  @keyframes fadeUp { from { opacity: 0; transform: translateY(18px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
</style>
</head>
<body>

<div class="page">
  <div class="deco-line-top"></div>

  <div class="logo-wrap">
    <a href="https://www.instagram.com/plumebar" target="_blank">
      <img src="logo plume.png" alt="Plume Restaurant">
    </a>
  </div>

  <p class="tagline">Edmonton, AB</p>
  <div class="gold-rule"></div>
  <p class="menu-label">Select your menu</p>

  <div class="btn-col">
    <a class="btn" href="food.jpg" target="_blank">
      <div class="btn-text">
        <span class="btn-title">Food Menu</span>
        <span class="btn-hint">Tap to view</span>
      </div>
      <span class="btn-arrow">→</span>
    </a>

    <a class="btn" href="drinks.jpg" target="_blank">
      <div class="btn-text">
        <span class="btn-title">Drink Menu</span>
        <span class="btn-hint">Tap to view</span>
      </div>
      <span class="btn-arrow">→</span>
    </a>
  </div>

  <div class="deco-line-bottom"></div>

  <div class="powered-by">
    <a href="https://instagram.com/interformlabs" target="_blank">Powered by Interform</a>
  </div>
</div>

<script>
  document.querySelectorAll('.btn').forEach(btn => {
    btn.addEventListener('click', function(e) {
      const r = document.createElement('span');
      r.className = 'ripple';
      const rect = btn.getBoundingClientRect();
      r.style.left = (e.clientX - rect.left - 4) + 'px';
      r.style.top  = (e.clientY - rect.top  - 4) + 'px';
      btn.appendChild(r);
      setTimeout(() => r.remove(), 600);
    });
  });
</script>

</body>
</html>
